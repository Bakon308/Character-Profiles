<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WTA // Grimoria Mainframe</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .grimoria-banner {
      text-align: center;
      padding: 18px 0 10px 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
    }
    .grimoria-banner .subtitle {
      color: #888;
      font-size: 0.78rem;
      letter-spacing: 3px;
      margin-top: 4px;
    }
    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn-terminal.danger {
      border-color: #eb3b34;
      color: #eb3b34;
    }
    .btn-terminal.danger:hover {
      background-color: rgba(235,59,52,0.1);
    }
    .count-bar {
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 1px;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <header>
    <h1>WHITE TIGER ARCHIVES // INTERNAL DATABASE</h1>
    <p class="status-bar">SYSTEM STATUS: SECURE // GRIMORIA FIRST ANNIVERSARY EDITION</p>
  </header>

  <main>
    <!-- Controls card -->
    <section class="terminal-card" style="border-color: var(--neon-blue);">
      <h2>[ARCHIVE CONTROL TERMINAL]</h2>
      <div class="action-row">
        <button onclick="exportDatabase()" class="btn-terminal">EXPORT DATABASE (.JSON)</button>
        <label class="btn-terminal success" style="display:inline-block; cursor:pointer; margin-top:0;">
          IMPORT DATA PACKET (.JSON)
          <input type="file" id="import-file" accept=".json" style="display:none;"
                 onchange="importDatabase(this)">
        </label>
        <button onclick="resetToCanon()" class="btn-terminal danger">RESET TO CANON DATA</button>
      </div>
      <p class="count-bar" id="count-bar">// SCANNING MAINFRAME...</p>
    </section>

    <!-- Decryption overlay (import animation) -->
    <div id="decryption-overlay" class="hidden"
         style="position:fixed;top:0;left:0;width:100vw;height:100vh;
                background-color:rgba(7,9,14,0.98);z-index:9999;
                display:flex;flex-direction:column;justify-content:center;align-items:center;
                font-family:inherit;">
      <div style="width:500px;border:1px solid var(--neon-blue);padding:30px;
                  background-color:var(--panel-bg);box-shadow:0 0 30px rgba(0,229,255,0.2);">
        <h2 style="color:var(--neon-blue);margin-bottom:5px;" id="matrix-header">
          INITIALIZING DECRYPTION SEQUENCE...
        </h2>
        <div class="status-bar" id="matrix-sub">READING RAW INTERFERENCE PACKETS</div>
        <div id="matrix-log"
             style="height:150px;background-color:#030406;border:1px solid var(--border-color);
                    margin:20px 0;padding:10px;font-size:0.8rem;overflow:hidden;
                    color:#507080;line-height:1.4;"></div>
        <div style="width:100%;height:4px;background-color:var(--border-color);position:relative;">
          <div id="matrix-progress"
               style="width:0%;height:100%;background-color:var(--neon-blue);
                      transition:width 0.1s linear;"></div>
        </div>
      </div>
    </div>

    <!-- Directory -->
    <section>
      <h2>[CLASSIFIED ARCHIVE DIRECTORY]</h2>
      <div id="directory-grid" class="grid-container"></div>
    </section>

  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      displayDirectory();
      updateCountBar();
    });

    function updateCountBar() {
      const n = getAllCharacters().length;
      document.getElementById('count-bar').textContent =
        `// ${n} DOSSIER${n !== 1 ? 'S' : ''} ACTIVE IN LOCAL MAINFRAME`;
    }

    function resetToCanon() {
      if (!confirm('RESET ALL DATA TO STORY CANON?\nThis will erase any local edits.')) return;
      localStorage.removeItem('wta_seeded_v1');
      localStorage.removeItem('wta_characters');
      seedIfNeeded();
      displayDirectory();
      updateCountBar();
    }
  </script>
</body>
</html>
