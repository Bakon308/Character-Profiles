<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WTA // Mainframe Terminal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>WHITE TIGER ARCHIVES // INTERNAL DATABASE</h1>
    <p class="status-bar">SYSTEM STATUS: SECURE // CORE INTERFACE SEGMENTATION</p>
  </header>

  <main>
    <section class="terminal-card" style="border-color: var(--neon-blue); position: relative;">
      <h2>[ARCHIVE DATA DECRYPTION PORTAL]</h2>
      <p class="status-bar" style="color: var(--text-main);">INPUT DECRYPTED LOGISTIC DATA PACKETS TO RECONSTRUCT DOSSIERS:</p>
      
      <div style="display: flex; gap: 15px; margin-top: 15px;">
        <label class="btn-terminal success" style="display: inline-block; cursor: pointer; margin-top: 0;">
          LOAD UNLOCKED DATA PACKET (.JSON)
          <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importDatabase(this)">
        </label>
        <button onclick="exportDatabase()" class="btn-terminal" style="border-color: #555; color: #888;">GENERATE COMPRESSED CORE (EXPORT)</button>
      </div>
    </section>

    <div id="decryption-overlay" class="hidden" style="position: fixed; top:0; left:0; width:100vw; height:100vh; background-color: rgba(7,9,14,0.98); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: inherit;">
      <div style="width: 500px; border: 1px solid var(--neon-blue); padding: 30px; background-color: var(--panel-bg); box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);">
        <h2 style="color: var(--neon-blue); margin-bottom: 5px;" id="matrix-header">INITIALIZING DECRYPTION SEQUENCE...</h2>
        <div class="status-bar" id="matrix-sub">READING RAW INTERFERENCE PACKETS</div>
        
        <div id="matrix-log" style="height: 150px; background-color: #030406; border: 1px solid var(--border-color); margin: 20px 0; padding: 10px; font-size: 0.8rem; overflow: hidden; color: #507080; line-height: 1.4;">
          </div>
        
        <div style="width: 100%; height: 4px; background-color: var(--border-color); position: relative;">
          <div id="matrix-progress" style="width: 0%; height: 100%; background-color: var(--neon-blue); transition: width 0.1s linear;"></div>
        </div>
      </div>
    </div>

    <section>
      <h2>[CLASSIFIED ARCHIVE DIRECTORY]</h2>
      <div id="directory-grid" class="grid-container"></div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      displayDirectory();
      
      document.getElementById('new-profile-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const rawTags = document.getElementById('form-tags').value;
        const processedTags = rawTags.split(',').map(t => t.trim()).filter(t => t !== "");

        // Build object out of default schema
        const blank = getBlankTemplate();
        const filledData = {
          ...blank,
          name: document.getElementById('form-name').value,
          alias: document.getElementById('form-alias').value,
          age: parseInt(document.getElementById('form-age').value),
          birthday: document.getElementById('form-birthday').value,
          status: document.getElementById('form-status').value,
          threatLevel: document.getElementById('form-threat').value,
          affiliation: document.getElementById('form-affiliation').value,
          tags: processedTags,
          caseFiles: document.getElementById('form-files').value
        };

        createCharacterProfile(filledData);
        e.target.reset();
        displayDirectory();
      });
    });
  </script>
</body>
</html>
